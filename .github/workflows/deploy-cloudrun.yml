name: Deploy Backend to Cloud Run

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/468858143339/locations/global/workloadIdentityPools/github-pool/providers/github"
          service_account: "github-deployer@albokemon.iam.gserviceaccount.com"

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: albokemon

      - name: Deploy
        run: |
          gcloud run deploy albokemon-backend \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --quiet